<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Manager Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; }</style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
        // Register Service Worker for offline support (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen flex justify-center">

<div class="w-full max-w-md bg-white min-h-screen shadow-xl flex flex-col">
    <div class="bg-blue-600 text-white p-6 rounded-b-3xl text-center">
        <h1 class="text-xl font-bold">แอปช่วยปลดหนี้</h1>
        <p class="text-blue-100 text-sm">ยอดหนี้รวม: <span id="totalDebt" class="font-bold text-lg">0</span> ฿</p>
    </div>

    <div class="flex border-b">
        <button id="tab1" onclick="showTab('manage')" class="flex-1 py-3 text-sm font-bold text-blue-600 border-b-2 border-blue-600">รายการหนี้</button>
        <button id="tab2" onclick="showTab('plan')" class="flex-1 py-3 text-sm font-bold text-slate-400 border-b-2 border-transparent">แผนการจ่าย</button>
    </div>

    <div class="p-4 flex-1">
        <div id="content-manage" class="space-y-4">
            <div class="bg-slate-50 p-4 rounded-xl border">
                <input type="hidden" id="editId">
                <input type="text" id="inName" placeholder="ชื่อรายการหนี้" class="w-full p-2 mb-2 rounded border">
                <input type="number" id="inAmount" placeholder="ยอดเงินต้น (฿)" class="w-full p-2 mb-2 rounded border">
                <input type="number" id="inMonthly" placeholder="ค่างวดรายเดือน (฿)" class="w-full p-2 mb-2 rounded border">
                <div class="flex gap-2">
                    <input type="number" id="inInterest" placeholder="ดอกเบี้ย (%)" class="w-full p-2 rounded border">
                    <button onclick="toggleCalc()" class="text-xs bg-slate-200 px-2 rounded">คำนวณ</button>
                </div>
                
                <div id="calcBox" class="hidden mt-3 p-3 bg-white border border-blue-300 rounded text-sm space-y-2">
                    <select id="calcMethod" class="w-full p-1 border rounded">
                        <option value="fixed">ดอกเบี้ยคงที่ (Fixed Rate)</option>
                        <option value="effective">ลดต้นลดดอก (Effective Rate)</option>
                    </select>
                    <input type="number" id="cPrincipal" placeholder="เงินต้น" class="w-full p-1 border rounded">
                    <input type="number" id="cMonthly" placeholder="ค่างวด" class="w-full p-1 border rounded">
                    <input type="number" id="cMonths" placeholder="จำนวนงวด" class="w-full p-1 border rounded">
                    <button onclick="runCalc()" class="w-full bg-blue-600 text-white p-1 rounded font-bold">คำนวณ</button>
                </div>
                <button id="btnSave" onclick="saveDebt()" class="w-full bg-green-600 text-white mt-3 p-2 rounded font-bold">บันทึกรายการ</button>
            </div>
            <div id="debtList" class="space-y-2"></div>
        </div>

        <div id="content-plan" class="hidden space-y-4">
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 space-y-4">
                <div>
                    <label class="text-sm font-bold text-blue-800">จ่ายไหวต่อเดือน (฿)</label>
                    <input type="number" id="payPower" onkeyup="updatePlan()" class="w-full p-3 mt-1 rounded border">
                    <div id="planRes" class="mt-2 text-sm text-slate-700"></div>
                </div>
                
                <div class="pt-4 border-t border-blue-200">
                    <label class="text-sm font-bold text-slate-600">ต้องการปลดหนี้ใน (งวด):</label>
                    <input type="number" id="goalMonths" value="120" onkeyup="updatePlan()" class="w-full p-3 mt-1 rounded border">
                    <div class="mt-3 p-3 bg-blue-600 text-white rounded-lg text-center">
                        <p class="text-xs opacity-80">ต้องจ่ายรายเดือนอย่างน้อย:</p>
                        <div id="goalResult" class="text-2xl font-bold">0 ฿</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let debts = [];

    function showTab(t) {
        document.getElementById('content-manage').classList.toggle('hidden', t !== 'manage');
        document.getElementById('content-plan').classList.toggle('hidden', t !== 'plan');
        document.getElementById('tab1').className = t === 'manage' ? 'flex-1 py-3 text-sm font-bold text-blue-600 border-b-2 border-blue-600' : 'flex-1 py-3 text-sm font-bold text-slate-400 border-b-2 border-transparent';
        document.getElementById('tab2').className = t === 'plan' ? 'flex-1 py-3 text-sm font-bold text-blue-600 border-b-2 border-blue-600' : 'flex-1 py-3 text-sm font-bold text-slate-400 border-b-2 border-transparent';
    }

    function toggleCalc() { document.getElementById('calcBox').classList.toggle('hidden'); }

    function runCalc() {
        const p = parseFloat(document.getElementById('cPrincipal').value);
        const m = parseFloat(document.getElementById('cMonthly').value);
        const mon = parseFloat(document.getElementById('cMonths').value);
        const method = document.getElementById('calcMethod').value;
        let rate = 0;

        if (method === 'fixed') {
            rate = (((m * mon) - p) / p) / (mon / 12) * 100;
        } else {
            let low = 0, high = 100, mid = 0;
            for(let i=0; i<40; i++) {
                mid = (low + high) / 2;
                let r = mid / 1200;
                let estPmt = p * (r * Math.pow(1+r, mon)) / (Math.pow(1+r, mon) - 1);
                if (estPmt > m) high = mid; else low = mid;
            }
            rate = mid;
        }
        document.getElementById('inAmount').value = p;
        document.getElementById('inMonthly').value = m;
        document.getElementById('inInterest').value = rate.toFixed(2);
        toggleCalc();
    }

    function saveDebt() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('inName').value;
        const amount = parseFloat(document.getElementById('inAmount').value);
        const monthly = parseFloat(document.getElementById('inMonthly').value);
        const interest = parseFloat(document.getElementById('inInterest').value);

        if(name && amount && !isNaN(interest)) {
            if(id) {
                const index = debts.findIndex(d => d.id == id);
                debts[index] = {id: parseInt(id), name, amount, monthly, interest};
            } else {
                debts.push({id: Date.now(), name, amount, monthly, interest});
            }
            render();
            clearForm();
        }
    }

    function editDebt(id) {
        const d = debts.find(x => x.id === id);
        document.getElementById('editId').value = d.id;
        document.getElementById('inName').value = d.name;
        document.getElementById('inAmount').value = d.amount;
        document.getElementById('inMonthly').value = d.monthly;
        document.getElementById('inInterest').value = d.interest;
        document.getElementById('btnSave').innerText = "บันทึกการแก้ไข";
    }

    function clearForm() {
        document.getElementById('editId').value = '';
        document.getElementById('inName').value = '';
        document.getElementById('inAmount').value = '';
        document.getElementById('inMonthly').value = '';
        document.getElementById('inInterest').value = '';
        document.getElementById('btnSave').innerText = "บันทึกรายการ";
    }

    function deleteDebt(id) {
        debts = debts.filter(d => d.id !== id);
        render();
    }

    function render() {
        let total = 0;
        const list = document.getElementById('debtList');
        list.innerHTML = '';
        debts.sort((a,b) => b.interest - a.interest).forEach(d => {
            total += d.amount;
            list.innerHTML += `<div class="p-3 border rounded flex justify-between items-center bg-white shadow-sm">
                <div class="flex-1">
                    <p class="font-bold text-slate-800">${d.name}</p>
                    <p class="text-xs text-slate-500">เงินต้น: ${d.amount.toLocaleString()} ฿</p>
                    <p class="text-xs font-semibold text-blue-600">จ่ายรายเดือน: ${d.monthly.toLocaleString()} ฿</p>
                </div>
                <div class="text-right">
                    <p class="text-red-500 font-bold">${d.interest}%</p>
                    <div class="flex gap-2 justify-end">
                        <button onclick="editDebt(${d.id})" class="text-[10px] text-blue-400 hover:text-blue-600 underline">แก้ไข</button>
                        <button onclick="deleteDebt(${d.id})" class="text-[10px] text-red-400 hover:text-red-600 underline">ลบ</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('totalDebt').innerText = total.toLocaleString();
        updatePlan();
    }

    function updatePlan() {
        const pay = parseFloat(document.getElementById('payPower').value);
        const goalMonths = parseFloat(document.getElementById('goalMonths').value);
        const total = debts.reduce((s,d) => s + d.amount, 0);
        
        document.getElementById('planRes').innerHTML = (pay > 0 && total > 0) ? `หนี้ทั้งหมดจะหมดในประมาณ <b>${Math.ceil(total/pay)} เดือน</b>` : '';
        
        if (goalMonths > 0 && total > 0) {
            const target = total / goalMonths;
            document.getElementById('goalResult').innerText = target.toLocaleString(undefined, {maximumFractionDigits: 0}) + " ฿";
        } else {
            document.getElementById('goalResult').innerText = "0 ฿";
        }
    }
</script>
</body>
</html>
